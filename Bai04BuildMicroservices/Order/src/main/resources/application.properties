# Tên ứng dụng và cổng chạy
spring.application.name=order-service
server.port=8081

# Đăng ký với Eureka Server
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

# Cấu hình Database MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/order_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Cấu hình Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Cấu hình Actuator & Prometheus
management.endpoints.web.exposure.include=health,prometheus

# --- CẤU HÌNH RESILIENCE4J ---
resilience4j.circuitbreaker.instances.inventory.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.inventory.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventory.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventory.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.inventory.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.inventory.max-attempts=3
resilience4j.retry.instances.inventory.wait-duration=3s
resilience4j.timelimiter.instances.inventory.timeout-duration=3s
